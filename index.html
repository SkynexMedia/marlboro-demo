<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SKYNEX Media — Site Viewer</title>

<!-- Leaflet 1.9 -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Leaflet Measure -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-measure@3.1.0/dist/leaflet-measure.css" />
<script src="https://unpkg.com/leaflet-measure@3.1.0/dist/leaflet-measure.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #map {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: #0a0a0a;
    z-index: 1;
  }

  /* === SKYNEX BRAND BAR === */
  .brand-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 44px;
    background: linear-gradient(180deg, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.85) 100%);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(244,180,0,0.25);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 1000;
  }

  .brand-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-logo {
    width: 20px;
    height: 20px;
    background: #F4B400;
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    flex-shrink: 0;
  }

  .brand-name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: #F4B400;
    text-transform: uppercase;
  }

  .brand-sep {
    width: 1px;
    height: 18px;
    background: rgba(244,180,0,0.3);
  }

  .brand-project {
    font-size: 11px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
  }

  .brand-badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(244,180,0,0.6);
    background: rgba(244,180,0,0.08);
    border: 1px solid rgba(244,180,0,0.15);
    padding: 3px 8px;
    border-radius: 3px;
  }

  /* === LAYER PANEL === */
  .layer-panel {
    position: absolute;
    top: 56px;
    right: 12px;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 12px 14px;
    z-index: 1000;
    min-width: 180px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .layer-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(244,180,0,0.7);
    margin-bottom: 10px;
  }

  .layer-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    cursor: pointer;
    user-select: none;
  }

  .layer-item:hover .layer-label {
    color: #fff;
  }

  .layer-check {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1.5px solid rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s ease;
  }

  .layer-check.active {
    background: #F4B400;
    border-color: #F4B400;
  }

  .layer-check.active::after {
    content: '';
    width: 6px;
    height: 6px;
    background: #0a0a0a;
    border-radius: 1px;
  }

  .layer-label {
    font-size: 12px;
    color: rgba(255,255,255,0.65);
    transition: color 0.15s ease;
  }

  .layer-tag {
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    margin-left: auto;
    font-style: italic;
  }

  .layer-divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 6px 0;
  }

  /* === OPACITY SLIDER === */
  .opacity-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0 2px 0;
  }

  .opacity-label {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    min-width: 48px;
  }

  .opacity-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.12);
    outline: none;
  }

  .opacity-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #F4B400;
    cursor: pointer;
  }

  .opacity-val {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    min-width: 28px;
    text-align: right;
  }

  /* === COORDINATES DISPLAY === */
  .coord-display {
    position: absolute;
    bottom: 8px;
    left: 12px;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px;
    padding: 5px 10px;
    font-size: 11px;
    font-family: 'Consolas', 'SF Mono', monospace;
    color: rgba(255,255,255,0.45);
    z-index: 1000;
    letter-spacing: 0.3px;
  }

  /* === MEASURE TOOL OVERRIDES === */
  .leaflet-control-measure {
    border: 1px solid rgba(255,255,255,0.1) !important;
    border-radius: 5px !important;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
  }

  .leaflet-control-measure .leaflet-control-measure-toggle {
    background-color: rgba(10,10,10,0.9) !important;
    border-radius: 5px !important;
    width: 34px !important;
    height: 34px !important;
  }

  .leaflet-control-measure .leaflet-control-measure-toggle:hover {
    background-color: rgba(30,30,30,0.95) !important;
  }

  .leaflet-control-measure .startprompt h3,
  .leaflet-control-measure .measureprompt h3 {
    color: #F4B400 !important;
  }

  /* === ZOOM CONTROL OVERRIDES === */
  .leaflet-control-zoom a {
    background: rgba(10,10,10,0.9) !important;
    color: rgba(255,255,255,0.7) !important;
    border-color: rgba(255,255,255,0.1) !important;
    width: 34px !important;
    height: 34px !important;
    line-height: 34px !important;
    font-size: 16px !important;
  }

  .leaflet-control-zoom a:hover {
    background: rgba(30,30,30,0.95) !important;
    color: #F4B400 !important;
  }

  .leaflet-control-zoom {
    border: 1px solid rgba(255,255,255,0.1) !important;
    border-radius: 5px !important;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
  }

  /* === ATTRIBUTION === */
  .leaflet-control-attribution {
    background: rgba(10,10,10,0.7) !important;
    color: rgba(255,255,255,0.3) !important;
    font-size: 9px !important;
  }

  .leaflet-control-attribution a {
    color: rgba(244,180,0,0.5) !important;
  }

  /* === MOBILE === */
  @media (max-width: 600px) {
    .brand-bar { height: 38px; padding: 0 10px; }
    .brand-name { font-size: 11px; letter-spacing: 2px; }
    .brand-project { display: none; }
    .brand-sep { display: none; }
    .brand-badge { font-size: 8px; padding: 2px 6px; }
    .layer-panel { top: 48px; right: 8px; min-width: 160px; padding: 10px 12px; }
    .coord-display { font-size: 10px; bottom: 6px; left: 8px; }
  }
</style>
</head>
<body>

<!-- BRAND BAR -->
<div class="brand-bar">
  <div class="brand-left">
    <div class="brand-logo"></div>
    <span class="brand-name">SKYNEX Media</span>
    <div class="brand-sep"></div>
    <span class="brand-project">Marlboro Township — Construction Site</span>
  </div>
  <span class="brand-badge">Interactive Viewer</span>
</div>

<!-- LAYER PANEL -->
<div class="layer-panel">
  <div class="layer-title">Layers</div>

  <div class="layer-item" onclick="toggleLayer('ortho')">
    <div class="layer-check active" id="check-ortho"></div>
    <span class="layer-label">Orthomosaic</span>
  </div>

  <div class="layer-item" onclick="toggleLayer('satellite')">
    <div class="layer-check active" id="check-satellite"></div>
    <span class="layer-label">Satellite</span>
  </div>

  <div class="layer-divider"></div>

  <div class="layer-item" onclick="toggleLayer('contours')">
    <div class="layer-check" id="check-contours"></div>
    <span class="layer-label">Contour Lines</span>
    <span class="layer-tag">coming soon</span>
  </div>

  <div class="layer-item" onclick="toggleLayer('gcps')">
    <div class="layer-check" id="check-gcps"></div>
    <span class="layer-label">GCP Markers</span>
    <span class="layer-tag">coming soon</span>
  </div>

  <div class="layer-divider"></div>

  <div class="opacity-row">
    <span class="opacity-label">Opacity</span>
    <input type="range" class="opacity-slider" id="ortho-opacity" min="0" max="100" value="90" oninput="setOrthoOpacity(this.value)">
    <span class="opacity-val" id="opacity-val">90%</span>
  </div>
</div>

<!-- COORDINATE DISPLAY -->
<div class="coord-display" id="coords">40.3186°N, 74.2439°W</div>

<!-- MAP -->
<div id="map"></div>

<script>
// === BOUNDS from gdal2tiles ===
var sw = [40.31681787617521, -74.24589198549170];
var ne = [40.32047817458884, -74.24189684928949];
// Note: gdal2tiles swapped lon values — corrected here
var bounds = L.latLngBounds(
  [Math.min(sw[0], ne[0]), Math.min(sw[1], ne[1])],
  [Math.max(sw[0], ne[0]), Math.max(sw[1], ne[1])]
);
var center = bounds.getCenter();

// === BASE LAYERS ===

// Black/empty background
var blackBg = L.tileLayer('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==', {
  minZoom: 13,
  maxZoom: 21
});

// Satellite (Esri)
var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '&copy; Esri',
  minZoom: 13,
  maxZoom: 21
});

// === ORTHO OVERLAY ===
var orthoLayer = L.tileLayer('./{z}/{x}/{y}.png', {
  tms: 0,
  opacity: 0.9,
  minZoom: 15,
  maxZoom: 21,
  bounds: bounds
});

// === MAP INIT ===
var map = L.map('map', {
  center: center,
  zoom: 18,
  minZoom: 13,
  maxZoom: 21,
  layers: [blackBg, satellite, orthoLayer],
  zoomControl: false,
  attributionControl: true
});

// Zoom control — top left under brand bar
L.control.zoom({ position: 'topleft' }).addTo(map);

// Fit to ortho bounds
map.fitBounds(bounds, { padding: [60, 60] });

// === MEASURE TOOL ===
var measureControl = L.control.measure({
  position: 'topleft',
  primaryLengthUnit: 'feet',
  secondaryLengthUnit: 'miles',
  primaryAreaUnit: 'sqfeet',
  secondaryAreaUnit: 'acres',
  activeColor: '#F4B400',
  completedColor: '#F4B400'
});
measureControl.addTo(map);

// === COORDINATE TRACKER ===
var coordEl = document.getElementById('coords');
map.on('mousemove', function(e) {
  var lat = e.latlng.lat.toFixed(6);
  var lng = Math.abs(e.latlng.lng).toFixed(6);
  coordEl.textContent = lat + '°N, ' + lng + '°W';
});

// Mobile: update on map move instead
map.on('moveend', function() {
  var c = map.getCenter();
  coordEl.textContent = c.lat.toFixed(6) + '°N, ' + Math.abs(c.lng).toFixed(6) + '°W';
});

// === LAYER TOGGLE ===
var layerState = {
  ortho: true,
  satellite: true,
  contours: false,
  gcps: false
};

function toggleLayer(id) {
  var checkEl = document.getElementById('check-' + id);

  if (id === 'contours' || id === 'gcps') {
    // Coming soon — no toggle
    return;
  }

  layerState[id] = !layerState[id];

  if (layerState[id]) {
    checkEl.classList.add('active');
  } else {
    checkEl.classList.remove('active');
  }

  if (id === 'ortho') {
    if (layerState.ortho) {
      map.addLayer(orthoLayer);
    } else {
      map.removeLayer(orthoLayer);
    }
  }

  if (id === 'satellite') {
    if (layerState.satellite) {
      map.addLayer(satellite);
    } else {
      map.removeLayer(satellite);
    }
  }
}

// === OPACITY CONTROL ===
function setOrthoOpacity(val) {
  var opacity = val / 100;
  orthoLayer.setOpacity(opacity);
  document.getElementById('opacity-val').textContent = val + '%';
}
</script>

</body>
</html>
